<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Terminal screenshot showing Pop Culture Agent examples</title>
  <desc id="desc">Three coding-agent progress updates with short pop-culture references followed by useful technical status text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171513"/>
      <stop offset="1" stop-color="#0e0d0c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1200" height="680" fill="#0e0d0c"/>
  <rect x="60" y="54" width="1080" height="572" rx="18" fill="url(#bg)" stroke="#3a342e" filter="url(#shadow)"/>
  <rect x="60" y="54" width="1080" height="58" rx="18" fill="#211d19"/>
  <circle cx="94" cy="83" r="9" fill="#ff5f4f"/>
  <circle cx="124" cy="83" r="9" fill="#f0b35f"/>
  <circle cx="154" cy="83" r="9" fill="#61d5cf"/>
  <text x="600" y="89" text-anchor="middle" fill="#aa9f91" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18">pop-culture-agent session</text>

  <g font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="27">
    <text x="92" y="162" fill="#61d5cf">&gt;</text>
    <text x="130" y="162" fill="#f6f1e8" font-weight="700">Enhance.</text>
    <text x="130" y="205" fill="#e7dfd0">The stale status path is in AuthReducer: logout clears</text>
    <text x="130" y="242" fill="#e7dfd0">the token but leaves the refresh task running.</text>

    <text x="92" y="324" fill="#61d5cf">&gt;</text>
    <text x="130" y="324" fill="#f6f1e8" font-weight="700">Snake? Snake!</text>
    <text x="130" y="367" fill="#e7dfd0">The installer test is failing on rerun, so I am checking</text>
    <text x="130" y="404" fill="#e7dfd0">whether generated preferences are being preserved correctly.</text>

    <text x="92" y="486" fill="#61d5cf">&gt;</text>
    <text x="130" y="486" fill="#f6f1e8" font-weight="700">See you, space cowboy.</text>
    <text x="130" y="529" fill="#e7dfd0">The prompt files are updated, the installer test passes,</text>
    <text x="130" y="566" fill="#e7dfd0">and the landing-page deploy completed successfully.</text>
  </g>
</svg>
